version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"

  reporting:
    build: ./reporting
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "8001:8001"

  worker:
    build: ./workers
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
